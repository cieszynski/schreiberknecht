<!DOCTYPE html>
<html lang="de">

<head>
    <title>Schreiberknecht Test4</title>
    <meta charset="utf-8">

    <style>
        @page a4w {
            size: A4 landscape;
        }

        @page a4 {
            size: A4 portrait;
        }

        @page custom {
            size: 210mm 210mm;
        }


        article {
            padding: 1em;
            /*             width: 210mm;
            height: 297mm; */
            background-color: #fff;
            page: a4w;

            &:last-of-type {
                page: custom;
            }
        }

        div {
            padding: 1em;
            border: 1px solid black;
            background-color: #ddd;
        }

        p {
            background-color: #eee;
        }

        span {
            /* white-space: pre; */
        }

        span.ep {
            background-color: yellow;
            /* display: none; */
            width: 0em;
        }

        span.br {
            background-color: green;
            display: inline-block;
            width: 1em;
        }
    </style>
</head>

<body>
    <div><article><p><span class="ep"><br></span></p></article></div>
    <hr>
    <div><article><p><span class="w">aaa</span><span class="ep"><br></span></p></article></div>
    <hr>
    <div><article><p><span class="w">aaa<span style="color: blue">blue</span></span><span class="ep"><br></span></p></article></div>
    <hr>
    <div><article><p><span class="w">aa<span style="color: red">red</span><span style="color: blue">blue</span>AA<span style="color: green">green</span>BB</span><span class="ep"><br></p></article></div>
    <hr>
    <div><article><p><span class="w">aaa</span><span class="sp"> </span><span class="w">bbb</span><span class="ep"><br></span></p></article></div>
    <hr>
    <div><article><p><span class="cm">,</span><span class="w">aaa</span><span class="cm">,</span><span class="w">bbb</span><span class="ep"><br></span></p></article></div>
    <hr>
    <div><article><p><span class="cm">,</span><span class="w">aaa</span><span class="cm">,</span><span class="w">bbb</span><span class="ep"><br></span></p><p><span class="cm">,</span><span class="w">aaa</span><span class="cm">,</span><span class="w">bbb</span><span class="ep"><br></span></p></article></div>
    
    <div><article><p><span class="cm">,</span><span class="w">aaa</span><span class="cm">,</span><span class="w">AAA</span><span class="ep"><br></span></p><p><span class="cm">,</span><span class="w">bbb</span><span class="cm">,</span><span class="w">BBB</span><span class="ep"><br></span></p><p><span class="cm">,</span><span class="w">ccc</span><span class="cm">,</span><span class="w">CCC</span><span class="ep"><br></span></p></article></div>
    
    
    <script type="module">
        import { Writer } from './writer.mjs';

        document.querySelectorAll('div').forEach(element => {
            const writer = new Writer(element)
        });
    </script>

</html>
