<!DOCTYPE html>
<html lang="de">

<head>
    <title>Test3 SchreiberKnecht</title>
    <meta charset="utf-8">

    <style>
        main {
            padding: 1em;
            border: 1px solid black;
        }

        p {
            background-color: #eee;
        }

        span {
            white-space: pre;
        }
    </style>
</head>

<body>
    <main contenteditable="true">
        <p><span class="br"><br></span></p>
    </main>
    <script>
        const main = document.querySelector('main');

        const createSpan = (text) => {
            const elem = document.createElement('span');
            elem.innerText = text;

            switch (text) {
                case ' ':
                    elem.className = 'sp';
                    break;
                default:
                    elem.className = 'w';
            }
            return elem;
        }

        const onDeleteContentBackward = (startNode, endNode, startText, endText, pre, post) => {
            console.debug('onDeleteContentBackward', startNode === endNode);
            
            if (startNode === endNode) {
                
                switch (startNode.className) {
                    case 'br': 
                        return;
                    default:
                        startNode.innerText = pre + post;
                }
                if (startNode.innerText) {
                    document
                        .getSelection()
                        .collapse(startNode.firstChild, pre.length);

                } else {
                    document
                        .getSelection()
                        .collapse(startNode.nextElementSibling);
                    startNode.remove();
                }
            } else {
                console.log(22, startNode, endNode, endNode.contains(startNode))
            }
        }

        const onInsertText = (startNode, endNode, startText, endText, pre, post, char) => {
            console.debug('onInsertText', startNode === endNode);

            if (startNode === endNode) {
                switch (startNode.className) {
                    case 'br': {
                        const span = createSpan(event.data);
                        startNode
                            .before(span);
                        document
                            .getSelection()
                            .collapse(span.firstChild, span.innerText.length);
                        break;
                    }

                    case 'sp':
                        const span = createSpan(event.data);
                        startNode.after(span);
                        document
                            .getSelection()
                            .collapse(span.firstChild, 1)
                        break;

                    default:
                        if ([' '].includes(event.data)) {
                            const sp = createSpan(event.data);

                            if (pre) {
                                startText.data = pre;
                                startNode.after(sp);
                            } else {
                                startNode.replaceWith(sp);
                            }

                            if (post) {
                                const span = createSpan(post);
                                sp.after(span);
                            }

                            document
                                .getSelection()
                                .collapse(sp.firstChild, 1)

                        } else {
                            startText.data = `${pre}${char}${post}`;
                            document
                                .getSelection()
                                .collapse(startNode.firstChild, pre.length + 1);
                        }
                }
            } else {
                if ([' '].includes(event.data)) {
                    const sp = createSpan(event.data);

                    if (pre) {
                        startText.data = pre;
                        startNode.after(sp);
                    } else {
                        startNode.replaceWith(sp);
                    }

                    if (post) {
                        endText.data = post;
                    } else {
                        endNode.remove()
                    }

                    document
                        .getSelection()
                        .collapse(sp.firstChild, 1)

                } else {
                    const nodes = [];
                    let offset = 0;

                    if (['w'].includes(startNode.className)) {
                        console.log(1)
                        startNode.innerText = pre;
                        nodes.push(startNode);
                        offset += pre.length;
                    }

                    if (['sp'].includes(startNode.className) && startNode.previousElementSibling?.className === 'w') {
                        console.log(2)
                        nodes.push(startNode.previousElementSibling);
                        offset += startNode.previousElementSibling.innerText.length;
                    }

                    nodes.push(createSpan(event.data))

                    if (['sp'].includes(endNode.className) && endNode.nextElementSibling?.className === 'w') {
                        console.log(3)
                        nodes.push(endNode.nextElementSibling);
                        offset += 1
                    }

                    if (['w'].includes(endNode.className)) {
                        console.log(4)
                        endNode.innerText = post;
                        nodes.push(endNode);
                        offset += 1;

                    }

                    const elem = nodes.reduce((prev, cur, idx, arr) => {
                        cur.innerText = prev.innerText + cur.innerText;
                        prev.remove();
                        return cur;
                    });

                    startNode.remove();
                    endNode.replaceWith(elem);

                    document
                        .getSelection()
                        .collapse(elem.firstChild, offset)
                }
            }
        }

        main.addEventListener('beforeinput', event => {

            event.preventDefault();

            const [range] = event.getTargetRanges();
            console.log(range)

            const startText = (range.startContainer === event.target /* firefox */)
                ? range.startContainer.firstChild.firstChild.firstChild
                : (range.startContainer.nodeType === Node.ELEMENT_NODE /* firefox */)
                    ? document.createTextNode(range.startContainer.innerText)
                    : range.startContainer

            const startNode = (range.startContainer.nodeType === Node.TEXT_NODE)
                ? (range.startContainer.parentElement === event.target /* firefox */)
                    ? range.startContainer.parentElement.firstElementChild.firstElementChild
                    : range.startContainer.parentElement
                : range.startContainer /* firefox */

            const endText = (range.endContainer === event.target /* firefox */)
                ? range.endContainer.lastChild.lastChild.firstChild
                : (range.endContainer.nodeType === Node.ELEMENT_NODE /* firefox */)
                    ? document.createTextNode(range.endContainer.innerText)
                    : range.endContainer

            const endNode = (range.endContainer.nodeType === Node.TEXT_NODE)
                ? range.endContainer.parentElement
                : (range.endContainer.parentElement === event.target /* firefox */)
                    ? range.endContainer.parentElement.lastElementChild.firstElementChild
                    : range.endContainer /* firefox */

            const pre = startText.data.slice(0, range.startOffset);
            const post = endText.data.slice(range.endOffset);

            console.log(
                'startText', startText,
                'startNode', startNode,
                'endText', endText,
                'endNode', endNode,
                'pre', pre,
                'post', post)

            if (range.startContainer !== range.endContainer) {
                // über mehre Worte/Leerzeichen/Absätze
                const startParent = startNode.closest('p, h1');
                const endParent = endNode.closest('p, h1');

                let next = startParent?.nextElementSibling;

                while (next && next !== endParent) {
                    const current = next;
                    next = next.nextElementSibling;
                    current.remove()
                }

                next = startNode?.nextElementSibling;

                while (next && next !== endNode) {
                    const current = next;
                    next = next.nextElementSibling;
                    current.remove()
                }

                let prev = endNode?.previousElementSibling;

                while (prev && prev !== startNode) {
                    const current = prev;
                    prev = prev.previousElementSibling;
                    current.remove()
                }
            }

            switch (event.inputType) {
                case 'insertText':
                    return onInsertText(startNode, endNode, startText, endText, pre, post, event.data);

                case 'deleteContentBackward':
                    return onDeleteContentBackward(startNode, endNode, startText, endText, pre, post);

                default:
                    console.log(event.inputType)
            }

            // console.log(
            //     'startText', startText,
            //     'startNode', startNode,
            //     'endText', endText,
            //     'endNode', endNode,
            //     'pre', pre,
            //     'post', post)
        });

        main.addEventListener('input', event => {
            event.preventDefault()
        });
    </script>
</body>

</html>
