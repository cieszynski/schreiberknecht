<!DOCTYPE html>
<html lang="de">

<head>
    <title>Test3 SchreiberKnecht</title>
    <meta charset="utf-8">

    <style>
        main {
            padding: 1em;
            border: 1px solid black;
        }

        p {
            background-color: #eee;
        }

        span {
            white-space: pre;
        }
    </style>
</head>

<body>
    <main contenteditable="true"></main>
    <input>
    <script>
        const main = document.querySelector('main');

        const createSpan = (text) => {
            const elem = document.createElement('span');
            elem.innerText = text;

            switch (text) {
                case ' ':
                    elem.className = 'sp';
                    break;
                default:
                    elem.className = 'w';
            }
            return elem;
        }

        const onDeleteContent = (startNode, endNode, pre, post) => {

            if (startNode === endNode) {
                console.info('onDeleteContent: startNode === endNode', startNode, endNode)
                switch (startNode.className) {
                    case 'br':
                        return;
                    default:
                        startNode.innerText = pre + post;
                }
                if (startNode.innerText) {
                    document
                        .getSelection()
                        .collapse(startNode.firstChild, pre.length);

                } else {
                    document
                        .getSelection()
                        .collapse(startNode.nextElementSibling);
                    startNode.remove();
                }
            } else {
                console.info('onDeleteContent: startNode !== endNode', startNode, endNode)
                const nodes = [];
                let offset = 0;

                if (['w'].includes(startNode.className)) {
                    startNode.innerText = pre;
                    nodes.push(startNode);
                    offset += pre.length;
                }

                if (['sp'].includes(startNode.className) && startNode.previousElementSibling?.className === 'w') {
                    nodes.push(startNode.previousElementSibling);
                    offset += startNode.previousElementSibling.innerText.length;
                }

                nodes.push(createSpan(event.data))

                if (['sp'].includes(endNode.className) && endNode.nextElementSibling?.className === 'w') {
                    nodes.push(endNode.nextElementSibling);
                    offset += 0
                }

                if (['w'].includes(endNode.className)) {
                    endNode.innerText = post;
                    nodes.push(endNode);
                    offset += 0;

                }

                const elem = nodes.reduce((prev, cur, idx, arr) => {
                    cur.innerText = prev.innerText + cur.innerText;
                    prev.remove();
                    return cur;
                });

                startNode.remove();

                if (elem.innerText) {
                    endNode.replaceWith(elem);
                    document
                        .getSelection()
                        .collapse(elem.firstChild, offset)
                } else {
                    document
                        .getSelection()
                        .collapse(endNode.nextElementSibling)
                    endNode.remove()
                }
            }
        }

        const onInsertText = (startNode, endNode, startText, endText, pre, post, char) => {
            console.debug('onInsertText', startNode === endNode);

            if (startNode === endNode) {
                switch (startNode.className) {
                    case 'br': {
                        const span = createSpan(event.data);
                        startNode
                            .before(span);
                        document
                            .getSelection()
                            .collapse(span.firstChild, span.innerText.length);
                        break;
                    }

                    case 'sp':
                        const span = createSpan(event.data);
                        startNode.after(span);
                        document
                            .getSelection()
                            .collapse(span.firstChild, 1)
                        break;

                    default:
                        if ([' '].includes(event.data)) {
                            const sp = createSpan(event.data);

                            if (pre) {
                                startText.data = pre;
                                startNode.after(sp);
                            } else {
                                startNode.replaceWith(sp);
                            }

                            if (post) {
                                const span = createSpan(post);
                                sp.after(span);
                            }

                            document
                                .getSelection()
                                .collapse(sp.firstChild, 1)

                        } else {
                            startText.data = `${pre}${char}${post}`;
                            document
                                .getSelection()
                                .collapse(startNode.firstChild, pre.length + 1);
                        }
                }
            } else {
                if ([' '].includes(event.data)) {
                    const sp = createSpan(event.data);

                    if (pre) {
                        startText.data = pre;
                        startNode.after(sp);
                    } else {
                        startNode.replaceWith(sp);
                    }

                    if (post) {
                        endText.data = post;
                    } else {
                        endNode.remove()
                    }

                    document
                        .getSelection()
                        .collapse(sp.firstChild, 1)

                } else {
                    const nodes = [];
                    let offset = 0;

                    if (['w'].includes(startNode.className)) {
                        startNode.innerText = pre;
                        nodes.push(startNode);
                        offset += pre.length;
                    }

                    if (['sp'].includes(startNode.className) && startNode.previousElementSibling?.className === 'w') {
                        nodes.push(startNode.previousElementSibling);
                        offset += startNode.previousElementSibling.innerText.length;
                    }

                    nodes.push(createSpan(event.data))

                    if (['sp'].includes(endNode.className) && endNode.nextElementSibling?.className === 'w') {
                        nodes.push(endNode.nextElementSibling);
                        offset += 1
                    }

                    if (['w'].includes(endNode.className)) {
                        endNode.innerText = post;
                        nodes.push(endNode);
                        offset += 1;

                    }

                    const elem = nodes.reduce((prev, cur, idx, arr) => {
                        cur.innerText = prev.innerText + cur.innerText;
                        prev.remove();
                        return cur;
                    });

                    startNode.remove();
                    endNode.replaceWith(elem);

                    document
                        .getSelection()
                        .collapse(elem.firstChild, offset)
                }
            }
        }




        main.addEventListener('beforeinput', event => {

            event.preventDefault();

            const [range] = event.getTargetRanges();
            //console.log(range)

            const [startText, startNode] = function (node) {

                if (node.nodeType === Node.TEXT_NODE) {
                    console.info('node.nodeType === Node.TEXT_NODE')
                    return [
                        node, node.parentElement
                    ]
                }

                if (node === event.target) {
                    console.info('node === event.target')
                    return [
                        document.createTextNode(node.firstChild.innerText),
                        node.firstChild.firstChild
                    ]
                }

                // if (node.parentNode === event.target) {
                //     console.info('node.parentNode === event.target')
                //     return [

                //     ]
                // }

                return [node.innerText, node];
            }(range.startContainer)

            console.log('startText', startText, 'startNode', startNode)

            const [endText, endNode] = function (node) {

                if (node.nodeType === Node.TEXT_NODE) {
                    console.info('node.nodeType === Node.TEXT_NODE')
                    return [
                        node, node.parentElement
                    ]
                }



                // if (node === event.target) {
                //     console.info('node === event.target')
                //     return [
                //         document.createTextNode(node.lastChild.lastChild.previousElementSibling.innerText),
                //         node.lastChild.lastChild.previousElementSibling
                //     ]
                // }

                return [node.innerText, node];
            }(range.endContainer)

            console.log('endText', endText, 'endNode', endNode)
            // const startText = (range.startContainer === event.target /* firefox */)
            //     ? range.startContainer.firstChild.firstChild.firstChild
            //     : (range.startContainer.nodeType === Node.ELEMENT_NODE /* firefox */)
            //         ? document.createTextNode(range.startContainer.innerText)
            //         : range.startContainer

            // const startNode = (range.startContainer.nodeType === Node.TEXT_NODE)
            //     ? (range.startContainer.parentElement === event.target /* firefox */)
            //         ? range.startContainer.parentElement.firstElementChild.firstElementChild
            //         : range.startContainer.parentElement
            //     : range.startContainer /* firefox */

            // const endText = (range.endContainer === event.target /* firefox */)
            //     ? range.endContainer.lastChild.lastChild.firstChild
            //     : (range.endContainer.nodeType === Node.ELEMENT_NODE /* firefox */)
            //         ? document.createTextNode(range.endContainer.innerText)
            //         : range.endContainer

            // const endNode = (range.endContainer.nodeType === Node.TEXT_NODE)
            //     ? range.endContainer.parentElement
            //     : (range.endContainer.parentElement === event.target /* firefox */)
            //         ? range.endContainer.parentElement.lastElementChild.firstElementChild
            //         : range.endContainer /* firefox */

            const pre = startText?.data?.slice(0, range.startOffset);
            const post = endText?.data?.slice(range.endOffset);

            // console.log(
            //     'startText', startText,
            //     'startNode', startNode,
            //     'endText', endText,
            //     'endNode', endNode,
            //     'pre', pre,
            //     'post', post)

            if (range.startContainer !== range.endContainer) {
                // über mehre Worte/Leerzeichen/Absätze
                const startParent = startNode.closest('p, h1');
                const endParent = endNode.closest('p, h1');

                let next = startParent?.nextElementSibling;

                while (next && next !== endParent) {
                    const current = next;
                    next = next.nextElementSibling;
                    current.remove()
                }

                next = startNode?.nextElementSibling;

                while (next && next !== endNode) {
                    const current = next;
                    next = next.nextElementSibling;
                    current.remove()
                }

                let prev = endNode?.previousElementSibling;

                while (prev && prev !== startNode) {
                    const current = prev;
                    prev = prev.previousElementSibling;
                    current.remove()
                }
            }

            console.log(event.inputType)
            switch (event.inputType) {
                case 'insertText':
                    return onInsertText(startNode, endNode, startText, endText, pre, post, event.data);

                case 'deleteContentBackward':
                case 'deleteContentForward':
                case 'deleteContent':
                case 'deleteByDrag':
                case 'deleteByCut':
                    return onDeleteContent(startNode, endNode, pre, post);

                default:
                    console.log(event.inputType)
            }

            // console.log(
            //     'startText', startText,
            //     'startNode', startNode,
            //     'endText', endText,
            //     'endNode', endNode,
            //     'pre', pre,
            //     'post', post)
        });

        main.innerHTML = '<p><span class="br"><br></span></p>';

        // webkit: vehindert, dass das Löschen über den Anfang hinaus
        const observer = new MutationObserver((mutationList, observer) => {
            for (const mutation of mutationList) {
                observer.disconnect();
                mutation.target.innerHTML = '<p><span class="br"><br></span></p>';
                document
                    .getSelection()
                    .collapse(mutation.target.firstChild.firstChild);
                observer.observe(mutation.target, {
                    childList: true
                });
            }
        });

        observer.observe(main, {
            childList: true
        });

        //main.addEventListener("selectstart", (event) => { console.log(event) })

        main.addEventListener('input', event => {
            event.preventDefault()
        });


        document.addEventListener("selectionchange", (event) => {

            const selection = document.getSelection();

            if (selection.anchorNode === selection.focusNode) return;

            const bit = (selection.anchorNode.compareDocumentPosition(selection.focusNode)
                & Node.DOCUMENT_POSITION_FOLLOWING);

            const [startNode, endNode] = (bit === 4)
                ? [selection.anchorNode, selection.focusNode]
                : [selection.focusNode, selection.anchorNode];

            let start = startNode;
            let end = endNode;

                console.log(1, start, end)

            

            if (startNode.isContentEditable && endNode.isContentEditable) {
                start = startNode.querySelector('span.w, span.br');
                end = endNode.lastChild;
                selection.setBaseAndExtent(start.firstChild, 0, end.firstChild, 0);
                return
            }

            if (endNode.isContentEditable) {
                end = endNode.lastChild;
                selection.setBaseAndExtent(start.firstChild, 0, end.firstChild, 0);
                return
            }

            if (endNode.nodeName==='P') {
                end = endNode.lastChild//.querySelector('span.w, span.br')
                selection.setBaseAndExtent(start.firstChild, 0, end.firstChild, 0);
                return
            }

                console.log(2, start, end)
            try {
                //selection.setBaseAndExtent(start, 0, end, 0)
            } catch (ex) { console.error(ex) }

            /*             switch (selection.type) {
                            case 'Caret':
                                break;
                            case 'Range':
                                break;
                            default:
                                console.info('Selection: None')
                        } */
            /* console.log(selection) console.log(selection.type);*/
        })
    </script>
</body>
