<!DOCTYPE html>
<html lang="de">

<head>
    <title>Test2 SchreiberKnecht</title>
    <meta charset="utf-8">

    <style>
        main {
            padding: 1em;
            border: 1px solid black;
        }

        p {
            background-color: #eee;
        }

        span {
            white-space: pre;
        }
    </style>
</head>

<body>
    <main contenteditable="true"></main>
    <script>
        const main = document.querySelector('main');

        const isBR = (value) => (value?.className || value.parentNode?.className) === 'br';
        const isSP = (value) => (value?.className || value.parentNode?.className) === 'sp';

        const createSpan = (text) => {
            const elem = document.createElement('span');
            elem.innerText = text;

            switch (text) {
                case ' ':
                    elem.className = 'sp';
                    break;
                default:
                    elem.className = 'w';
            }
            return elem;
        }

        const onInsertText = (event) => {
            console.log('onInsertText')

            event.preventDefault();

            const [range] = event.getTargetRanges();

            const startText = range.startContainer.firstChild
                ? document.createTextNode(range.startContainer.innerText)
                : range.startContainer

            const startNode = range.startContainer.data
                ? range.startContainer.parentNode
                : range.startContainer

            const endText = range.endContainer.firstChild
                ? document.createTextNode(range.endContainer.innerText)
                : range.endContainer

            const endNode = range.endContainer.data
                ? range.endContainer.parentNode
                : range.endContainer

            const pre = startText.data.slice(0, range.startOffset);
            const post = endText.data.slice(range.endOffset);

            // innerhalb eines Wortes
            if (range.startContainer === range.endContainer) {

                switch (startNode.className) {
                    case 'br': {
                        const span = createSpan(event.data);
                        startNode
                            .before(span);
                        document
                            .getSelection()
                            .collapse(span.firstChild, span.innerText.length);
                        break;
                    }

                    case 'sp':
                        const span = createSpan(event.data);
                        startNode.after(span);
                        document
                            .getSelection()
                            .collapse(span.firstChild, 1)
                        break;

                    default:
                        if ([' '].includes(event.data)) {
                            const sp = createSpan(event.data);

                            if (pre) {
                                startText.data = pre;
                                startNode.after(sp);
                            } else {
                                startNode.replaceWith(sp);
                            }

                            if (post) {
                                const span = createSpan(post);
                                sp.after(span);
                            }

                            document
                                .getSelection()
                                .collapse(sp.firstChild, 1)

                        } else {
                            startText.data = `${pre}${event.data}${post}`;
                            document
                                .getSelection()
                                .collapse(startNode.firstChild, range.startOffset + event.data.length);
                        }
                }
            } else {
                // über mehre Worte/Leerzeichen
                const startParent = startNode.closest('p, h1');
                const endParent = endNode.closest('p, h1');

                let next = startParent.nextElementSibling;

                while (next && next !== endParent) {
                    const current = next;
                    next = next.nextElementSibling;
                    current.remove()
                }

                next = startNode.nextElementSibling;

                while (next && next !== endNode) {
                    const current = next;
                    next = next.nextElementSibling;
                    current.remove()
                }

                let prev = endNode.previousElementSibling;

                while (prev && prev !== startNode) {
                    const current = prev;
                    prev = prev.previousElementSibling;
                    current.remove()
                }

                console.log(pre, post)

                if ([' '].includes(event.data)) {
                    const sp = createSpan(event.data);

                    if (pre) {
                        startText.data = pre;
                        startNode.after(sp);
                    } else {
                        startNode.replaceWith(sp);
                    }

                    if (post) {
                        endText.data = post;
                    } else {
                        endNode.remove()
                    }

                    document
                        .getSelection()
                        .collapse(sp.firstChild, 1)

                } else {
                    const nodes = []

                    if (['sp'].includes(startNode.className) && startNode.previousElementSibling?.className === 'w') {
                        nodes.push(startNode.previousElementSibling);
                    }

                    nodes.push(createSpan(event.data))

                    if (['sp'].includes(endNode.className) && endNode.nextElementSibling?.className === 'w') {
                        nodes.push(endNode.nextElementSibling);
                    }

                    const elem = nodes.reduce((prev, cur) => {
                        cur.innerText = prev.innerText + cur.innerText;
                        prev.remove()
                        return cur
                    });

                    startNode.remove();
                    endNode.replaceWith(elem);
                }
            }

        }

        const onBeforeInput = (event) => {

            switch (event.inputType) {
                case 'insertText':
                    return onInsertText(event);
                default:
                    console.log(event.inputType)
            }
        }

        main.addEventListener('beforeinput', onBeforeInput);

        main.addEventListener('beforeinput1', event => {
            const [range] = event.getTargetRanges();

            switch (event.inputType) {
                case 'insertText':
                    event.preventDefault();
                    console.log(range)

                    const start = range.startContainer;
                    const end = range.endContainer;

                    switch (true) {
                        // leeres Textfeld, erstes Zeichen
                        case (start?.className === 'br' && end?.className === 'br'):

                            const span = new SpanElement()//document.createElement('span');
                            const text = span.appendChild(document.createTextNode(event.data));

                            switch (event.data) {
                                case ' ':
                                    span.className = 'sp';
                                    break
                                default:
                                    span.className = 'w';
                            }
                            start.before(span);
                            /*                             document
                                                            .getSelection()
                                                            .collapse(text, 1); */
                            return;

                        // vorheriges Zeichen ein Leerzeichen
                        case ((start === end) && (start?.parentNode.className === 'sp')): {
                            const span = document.createElement('span');
                            const text = span.appendChild(document.createTextNode(event.data));

                            switch (event.data) {
                                case ' ':
                                    span.className = 'sp';
                                    break;
                                default:
                                    span.className = 'w';
                            }
                            start.parentNode.after(span);
                            document
                                .getSelection()
                                .collapse(text, event.data.length);
                            return;
                        }

                        // vorheriges Zeichen ein Zeichen
                        case ((start === end) && (start?.parentNode.className === 'w')): {
                            console.log(8)
                        }

                        // im gleichen Wort
                        case (start === end):
                            switch (event.data) {
                                case ' ':
                                    const span = document.createElement('span');
                                    const text = span.appendChild(document.createTextNode(event.data));
                                    span.className = 'sp';
                                    start.parentNode.after(span);
                                    document
                                        .getSelection()
                                        .collapse(text, event.data.length);
                                    break
                                default:
                                    start.data += event.data;
                                    document
                                        .getSelection()
                                        .collapse(start, start.data.length);
                            }
                            break;
                    }
                    break;
                default:
                    console.log(event.inputType)
            }
        });

        main.innerHTML = '<p><span class="br"><br></span></p>';
    </script>
</body>
