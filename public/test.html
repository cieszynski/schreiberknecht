<!DOCTYPE html>
<html lang="de">

<head>
    <title>Test SchreiberKnecht</title>
    <meta charset="utf-8">

    <style>
        h1 {
            font-size: 12px;
        }

        main {
            outline: 1px solid gray;
            padding: 1em;
        }

        p {
            background-color: #eee;
        }

        span {
            white-space: pre;
        }
    </style>
</head>

<body>
    <h1>SchreiberKnecht</h1>
    <main contenteditable="true">
        <p><br></p>
    </main>

    <script>
        const main = document.querySelector('main');

        main.addEventListener('beforeinput', event => {

            const [range] = event.getTargetRanges();

            console.log(range)

            switch (event.inputType) {
                case 'deleteContentBackward':
                    event.preventDefault();

                    if (range.startContainer === range.endContainer) {

                        const text = range.startContainer;
                        const startSpan = text.parentElement;

                        // remove only the previous char or
                        // let the previous char, remove inside range
                        if ((range.endOffset - range.startOffset) >= 1) {

                            const pre = text.data.slice(0, range.startOffset);
                            const post = text.data.slice(range.endOffset);
                            text.data = `${pre}${post}`;

                            if (text.data) {
                                document.getSelection()
                                    .collapse(text, range.startOffset);
                            } else {
                                const br = document.createElement('br');
                                startSpan.replaceWith(br);
                                document.getSelection()
                                    .collapse(br.parentNode);
                            }
                        }
                    } else {
                        if (range.startContainer.nodeType === 3 && range.endContainer.nodeType === 1) {
                            console.log(5, 'Firefox')
                            return
                        }
                        console.log(5, range.startContainer, range.endContainer)

                        const startSpan = range.startContainer.parentNode;
                        const endSpan = range.endContainer.parentNode;
                        const startText = range.startContainer;
                        const endText = range.endContainer;

                        if (startSpan.parentElement === endSpan.parentElement) {
                            let next = startSpan.nextElementSibling;

                            while (next && next !== endSpan) {
                                console.log(11)
                                const current = next;
                                next = next.nextElementSibling;
                                current.remove();
                            }
                        } else {
                            console.log(55)
                        }
                    }
                    break;

                case 'insertText':
                    event.preventDefault();

                    if (!event.target.children.length) {
                        const p = event.target.appendChild(document.createElement('p'));
                        const span = p.appendChild(document.createElement('span'));
                        span.className = event.data === ' ' ? 'sp' : 'w'
                        const text = span.appendChild(document.createTextNode(event.data));
                        document.getSelection()
                            .collapse(text, event.data.length);
                        return;
                    }

                    if (range.startContainer === range.endContainer) {
                        let startSpan = range.startContainer.parentNode;
                        let text = range.startContainer;

                        if (range.startContainer.nodeName === 'P') {
                            // console.log(range.startContainer.childNodes)
                            range.startContainer.childNodes.forEach(element => {
                                element.remove();
                            });

                            startSpan = range.startContainer.appendChild(document.createElement('span'));
                            text = startSpan.appendChild(document.createTextNode(''));
                            startSpan.className = (event.data === ' ') ? 'sp' : 'w';
                        }
                        console.log(startSpan)
                        const pre = text?.data?.slice(0, range.startOffset) || '';
                        const post = text?.data?.slice(range.endOffset) || '';

                        if (event.data === ' ') {

                            if (range.collapsed) {
                                const spSpan = document.createElement('span');
                                spSpan.className = 'sp';
                                spSpan.innerText = ' ';

                                startSpan.innerText = pre;

                                startSpan.after(spSpan);

                                if (post) {
                                    const endSpan = document.createElement('span');
                                    endSpan.className = 'w';
                                    endSpan.innerText = post;
                                    spSpan.after(endSpan);
                                }

                                document
                                    .getSelection()
                                    .collapse(spSpan.firstChild, 1);
                            } else {
                                console.log('not collapsed')
                            }

                        } else {
                            console.log(22, pre, startSpan.className)
                            if (pre === ' ') {
                                const span = document.createElement('span');
                                span.className = 'w';
                                const text = span.appendChild(document.createTextNode(event.data));

                                startSpan.after(span);
                                document
                                    .getSelection()
                                    .collapse(text, 1);
                            } else {
                                text.data = `${pre}${event.data}${post}`;
                                document.getSelection()
                                    .collapse(text, range.startOffset + event.data.length);
                            }

                        }

                    } else {
                        const startSpan = range.startContainer.parentNode;
                        const endSpan = range.endContainer.parentNode;

                        if (startSpan.parentElement === endSpan.parentElement) {

                            let next = startSpan.nextElementSibling;

                            while (next) {
                                const current = next;
                                next = next.nextElementSibling;
                                current.remove();
                            }

                            if (event.data === ' ') {
                                const startText = range.startContainer;
                                const endText = range.endContainer;

                                startText.data = startText.data.slice(0, range.startOffset);
                                endText.data = endText.data.slice(range.endOffset);

                                const span = document.createElement('span');
                                span.className = 'sp';
                                span.innerText = ' ';

                                startSpan.after(span);
                            } else {
                                const startText = range.startContainer;
                                const endText = range.endContainer;

                                const pre = startText.data.slice(0, range.startOffset);
                                const post = endText.data.slice(range.endOffset);

                                startText.innerText = `${pre}${event.data}${post}`;

                                endSpan.remove();
                            }
                        } else {
                            console.error(8, range.startContainer.parentNode, range.endContainer.parentNode)
                        }

                    }
                    return
                default:
                    console.log(event.inputType)
            }
        });
    </script>
</body>

</html>
